<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classes</title>
  <link rel="icon" href="images/logo.png">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Day Navigator */
    .day-navigator {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin: 2rem 0 1.5rem;
      padding: 1rem 1.25rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
    }

    .day-nav-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      color: inherit;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      flex-shrink: 0;
    }

    .day-nav-btn:hover {
      background: rgba(255,255,255,0.22);
      transform: scale(1.08);
    }

    .day-nav-btn:active {
      transform: scale(0.96);
    }

    .day-nav-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none;
    }

    .day-nav-label {
      text-align: center;
      flex: 1;
    }

    .day-nav-label .day-name {
      display: block;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .day-nav-label .day-badge {
      display: inline-block;
      margin-top: 0.25rem;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0.2em 0.65em;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      opacity: 0.75;
    }

    /* Day schedule card */
    .day-schedule {
      animation: fadeSlide 0.25s ease;
    }

    @media (prefers-reduced-motion: reduce) {
      .day-schedule { animation: none; }
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .day-schedule ul {
      margin: 0.5rem 0 1rem 1.2rem;
    }

    .day-schedule .rest-day {
      font-style: italic;
      opacity: 0.65;
      margin: 0.5rem 0 1rem;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-logo">
      <img src="images/logo.png" alt="Pulse Studio logo">
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="Staff.html">Meet the Team!</a></li>
      <li><a href="Classes.html">Classes</a></li>
      <li><a href="index.html">Sign up!</a></li>
    </ul>
  </nav>

  <section class="hero">
    <h1>Classes</h1>
    <p>Discover our variety of fitness classes designed to challenge and inspire you.</p>
  </section>

  <section class="main-section">
    <div class="main-info">
      <h2>Weekly Gym Timetable</h2>

      <!-- Day navigator -->
      <div class="day-navigator" role="region" aria-label="Day timetable navigator">
        <button class="day-nav-btn" id="prevDayBtn" aria-label="Previous day">&#8592;</button>
        <div class="day-nav-label">
          <span class="day-name" id="currentDayName"></span>
          <span class="day-badge" id="currentDayBadge"></span>
        </div>
        <button class="day-nav-btn" id="nextDayBtn" aria-label="Next day">&#8594;</button>
      </div>

      <!-- Schedule display -->
      <div id="dayScheduleDisplay" class="day-schedule" aria-live="polite"></div>

    </div>
  </section>

  <footer class="footer">
    <p>© 2026 Pulse Studio · All rights reserved</p>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="script.js"></script>
  <script src="timetable.js"></script>

<!-- Accessibility Menu -->
<div id="access-menu-wrapper">
  <button id="access-toggle" aria-label="Open accessibility options" aria-expanded="false" aria-controls="access-panel">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="4" r="2"/><path d="M12 22V12M12 12l-4 4M12 12l4 4M6 8l6 2 6-2"/></svg>
  </button>
  <div id="access-panel" aria-hidden="true" role="region" aria-label="Accessibility options">
    <p class="access-panel-title">Accessibility</p>
    <button class="access-option" id="acc-font-size" aria-pressed="false">
      <span class="acc-icon" aria-hidden="true">A+</span> Text Size
    </button>
    <button class="access-option" id="acc-contrast" aria-pressed="false">
      <span class="acc-icon" aria-hidden="true">◑</span> High Contrast
    </button>
    <button class="access-option" id="acc-dyslexia" aria-pressed="false">
      <span class="acc-icon" aria-hidden="true">Aa</span> Dyslexia Font
    </button>
    <button class="access-option" id="acc-motion" aria-pressed="false">
      <span class="acc-icon" aria-hidden="true">⏸</span> Reduce Motion
    </button>
    <button class="access-option" id="acc-reset">
      <span class="acc-icon" aria-hidden="true">↺</span> Reset All
    </button>
  </div>
</div>
</body>
</html>
